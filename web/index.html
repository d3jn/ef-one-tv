<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ef-one-tv</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0a0e14; color: #f4f7fb;
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.04em; }
    a { display: block; min-width: 320px; padding: 16px 24px; border-radius: 8px;
      background: rgba(20, 26, 38, 0.9); color: #f4f7fb; text-decoration: none;
      font-size: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
    a:hover { background: rgba(28, 36, 52, 0.95); }
    .hint { color: #9fb0c3; font-size: 13px; }
  </style>
</head>
<body>
  <!-- Each overlay is its own page, so OBS can add them as separate browser
       sources. Pick one below. -->
  <div class="wrap">
    <h1>ef-one-tv overlays</h1>
    <a href="/standings">Standings tower</a>
    <a href="/quali_lap_sectors">Quali lap sectors</a>
    <a href="/inputs">Throttle / brake inputs</a>
    <p class="hint">Each overlay is sized to its own block — see the README for the
      browser-source dimensions.</p>
  </div>
</body>
</html>
